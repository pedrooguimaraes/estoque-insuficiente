<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Insuficiente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Biblioteca para geração do arquivo PDF -->
    <script src="https://script.google.com/macros/s/AKfycbwi1C72NrbQSWoEdQNb8cnH1MmwYrHsey0OFW8myjTWbBzbvRpOFbzeFb0cipOSRZ4/exec"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; background: #ffffff; padding: 15px 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background-color: #4f83e2; color: white; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text h1 { font-size: 18px; font-weight: 700; color: #1e293b; }
        .logo-text p { font-size: 11px; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; font-weight: 600; }
        .header-buttons { display: flex; gap: 10px; }
        .btn-header { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #e2e8f0; background: #fff; color: #64748b; }
        .btn-header.btn-add { background-color: #4f83e2; color: white; border: none; font-weight: 600; }
        .btn-header.btn-baixar-top { background-color: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; font-weight: 600; }
        .main-card { background: #ffffff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); padding: 20px; border: 1px solid #edf2f7; }
        .filters-row { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group { position: relative; flex: 1; min-width: 200px; }
        .input-group span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 14px; }
        .input-group input, .input-group select { width: 100%; padding: 10px 12px 10px 35px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge-info { background: #f8fafc; border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 20px; font-size: 13px; color: #475569; font-weight: 500; }
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13.5px; white-space: nowrap; }
        th { background-color: #1e293b; color: #f8fafc; padding: 14px 16px; font-size: 11px; text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; color: #334155; }
        .center { text-align: center; }
        .text-bold { font-weight: 600; color: #1e293b; }
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .status-pending { background-color: #fffbeb; color: #b45309; border: 1px solid #fef3c7; }
        .status-success { background-color: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }
        .btn-edit, .btn-delete { background: none; border: none; cursor: pointer; font-weight: 600; font-size: 13.5px; }
        .btn-edit { color: #4f83e2; }
        .btn-delete { color: #ef4444; }
        .thumb-img { width: 35px; height: 35px; object-fit: cover; border-radius: 6px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 420px; }
        .modal-field { margin-bottom: 15px; }
        .modal-field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .modal-field input, .modal-field select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-save { background: #4f83e2; border: none; color: white; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">📦</div>
            <div class="logo-text">
                <h1>Estoque Insuficiente - 047</h1>
                <p>Gerenciamento de Controle de Estoque</p>
            </div>
        </div>
        <div class="header-buttons">
            <button class="btn-header btn-baixar-top" id="btnBaixarTop">🖨️ Imprimir/Gerar PDF</button>
            <button class="btn-header btn-add" id="btnIncluirLinha">➕ Adicionar Estoque</button>
        </div>
    </header>

    <main class="main-card">
        <div class="filters-row">
            <div class="input-group"><input type="text" id="filtroPrev" placeholder="Filtrar Prevenção..."></div>
            <div class="input-group"><select id="filtroDepto"><option value="">Todos os departamentos</option></select></div>
            <div class="input-group"><input type="text" id="filtroCodigo" placeholder="Código de barras..."></div>
        </div>

        <div class="summary-row">
            <div class="badges-container">
                <div class="badge-info">Total <strong id="cont-total">0</strong></div>
                <div class="badge-info">✅ Baixados <strong id="cont-baixados">0</strong></div>
                <div class="badge-info">⏳ Pendentes <strong id="cont-pendentes">0</strong></div>
            </div>
        </div>

        <div class="table-container">
            <table id="produtosTable">
                <thead>
                    <tr><th>Data</th><th>Prevenção</th><th>Departamento</th><th>Documento</th><th>Espécie</th><th>Código</th><th>Descrição</th><th class="center">Qtd</th><th class="center">Foto</th><th>Status</th><th>Ações</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <input type="file" id="globalFileInput" accept="image/*" style="display: none;">

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitulo">Editar Produto</h3>
            <div class="modal-field"><label>Data</label><input type="date" id="modalData"></div>
            <div class="modal-field"><label>Prevenção</label><input type="text" id="modalPrev"></div>
            <div class="modal-field"><label>Departamento</label><input type="text" id="modalDepto"></div>
            <div class="modal-field"><label>Documento</label><input type="text" id="modalDoc"></div>
            <div class="modal-field"><label>Espécie</label><input type="text" id="modalEspecie"></div>
            <div class="modal-field"><label>Código</label><input type="text" id="modalCodigo"></div>
            <div class="modal-field"><label>Descrição</label><input type="text" id="modalDesc"></div>
            <div class="modal-field"><label>Quantidade</label><input type="number" id="modalQtd" value="1"></div>
            <div class="modal-field"><label>Status</label><select id="modalStatus"><option value="Pendente">Pendente</option><option value="Baixado">Baixado</option></select></div>
            <div class="modal-actions">
                <button id="btnFecharModal">Cancelar</button>
                <button class="btn-save" id="btnSalvarModal">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let linhaSendoEditada = null;
            let modoFormulario = "EDITAR";
            const tableBody = document.querySelector("#produtosTable tbody");
            const modalEdicao = document.getElementById("editModal");

            function atualizarContadores() {
                const linhas = tableBody.querySelectorAll("tr");
                let total = linhas.length, baixados = 0, pendentes = 0;
                linhas.forEach(l => l.querySelector(".cell-status").innerText.includes("Baixado") ? baixados++ : pendentes++);
                document.getElementById("cont-total").innerText = total;
                document.getElementById("cont-baixados").innerText = baixados;
                document.getElementById("cont-pendentes").innerText = pendentes;
            }

            document.getElementById("btnIncluirLinha").addEventListener("click", () => {
                modoFormulario = "INCLUIR";
                document.getElementById("modalTitulo").innerText = "Adicionar Novo Estoque";
                modalEdicao.style.display = "flex";
            });

            document.getElementById("btnSalvarModal").addEventListener("click", function () {
                const dataVal = document.getElementById("modalData").value || "-";
                const prevVal = document.getElementById("modalPrev").value || "-";
                const deptoVal = document.getElementById("modalDepto").value || "-";
                const statusVal = document.getElementById("modalStatus").value;
                const statusBadgeHTML = statusVal === "Baixado" ? `<span class="status-badge status-success">Baixado</span>` : `<span class="status-badge status-pending">Pendente</span>`;

                if (modoFormulario === "EDITAR" && linhaSendoEditada) {
                    linhaSendoEditada.querySelector(".cell-prev").innerText = prevVal;
                    linhaSendoEditada.querySelector(".cell-status").innerHTML = statusBadgeHTML;
                } else {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td class="cell-data">${dataVal}</td>
                        <td class="cell-prev">${prevVal}</td>
                        <td class="cell-depto text-bold">${deptoVal}</td>
                        <td class="cell-doc">-</td><td class="cell-especie">-</td><td class="cell-codigo">-</td><td class="cell-desc">-</td>
                        <td class="cell-qtd center text-bold">1</td>
                        <td class="center"><button class="btn-foto-trigger">📷</button></td>
                        <td class="cell-status">${statusBadgeHTML}</td>
                        <td><button class="btn-edit">✏️ Editar</button> <button class="btn-delete">🗑️ Deletar</button></td>
                    `;
                    tableBody.appendChild(tr);
                }
                atualizarContadores();
                modalEdicao.style.display = "none";
            });

            document.getElementById("btnFecharModal").addEventListener("click", () => modalEdicao.style.display = "none");
            
            tableBody.addEventListener("click", (e) => {
                if (e.target.classList.contains("btn-delete")) e.target.closest("tr").remove();
                atualizarContadores();
            });
        });
    </script>
</body>
</html>
