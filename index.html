<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estoque Insuficiente</title>
    <style>
        /* (Estilos mantidos iguais aos anteriores para manter o visual) */
        * { box-sizing: border-box; font-family: sans-serif; }
        body { padding: 20px; background: #f4f6f9; }
        .table-container { background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 10px; border: 1px solid #ddd; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 300px; }
    </style>
</head>
<body>

    <button id="btnIncluirLinha">➕ Adicionar Item</button>
    
    <div class="table-container">
        <select id="filtroDepto"><option value="">Todos os Departamentos</option></select>
        <p>Total: <span id="cont-total">0</span> | Pendentes: <span id="cont-pendentes">0</span></p>
        
        <table id="produtosTable">
            <thead>
                <tr>
                    <th>Prevenção</th><th>Departamento</th><th>Status</th><th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <input type="text" id="modalPrev" placeholder="Prevenção">
            <input type="text" id="modalDepto" placeholder="Departamento">
            <select id="modalStatus"><option value="Pendente">Pendente</option><option value="Baixado">Baixado</option></select>
            <button id="btnSalvarModal">Salvar</button>
        </div>
    </div>

    <script>
        const tableBody = document.querySelector("#produtosTable tbody");
        const modalEdicao = document.getElementById("editModal");
        let modoFormulario = "INCLUIR";
        let linhaSendoEditada = null;

        // --- FUNÇÕES DE SINCRONIZAÇÃO ---
        
        function atualizarContadores() {
            const total = tableBody.querySelectorAll("tr").length;
            const pendentes = tableBody.querySelectorAll(".status-pending").length;
            document.getElementById("cont-total").innerText = total;
            document.getElementById("cont-pendentes").innerText = pendentes;
        }

        function sincronizarFiltroDeptos() {
            const select = document.getElementById("filtroDepto");
            const deptos = new Set();
            tableBody.querySelectorAll(".cell-depto").forEach(td => deptos.add(td.innerText));
            
            // Limpa e recarrega as opções (mantendo a primeira)
            select.innerHTML = '<option value="">Todos os Departamentos</option>';
            deptos.forEach(d => {
                const opt = document.createElement("option");
                opt.value = d; opt.innerText = d;
                select.appendChild(opt);
            });
        }

        // --- EVENTOS ---

        document.getElementById("btnIncluirLinha").addEventListener("click", () => {
            modoFormulario = "INCLUIR";
            modalEdicao.style.display = "flex";
        });

        document.getElementById("btnSalvarModal").addEventListener("click", () => {
            const prev = document.getElementById("modalPrev").value;
            const depto = document.getElementById("modalDepto").value;
            const status = document.getElementById("modalStatus").value;
            const statusClass = status === "Baixado" ? "status-success" : "status-pending";

            if (modoFormulario === "INCLUIR") {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="cell-prev">${prev}</td>
                    <td class="cell-depto">${depto}</td>
                    <td><span class="status-badge ${statusClass}">${status}</span></td>
                    <td><button class="btn-delete">Remover</button></td>
                `;
                tableBody.appendChild(tr);
            }
            
            // O segredo da sincronização está aqui:
            sincronizarFiltroDeptos();
            atualizarContadores();
            modalEdicao.style.display = "none";
        });

        // Delegação de evento para remover linhas
        tableBody.addEventListener("click", (e) => {
            if (e.target.classList.contains("btn-delete")) {
                e.target.closest("tr").remove();
                sincronizarFiltroDeptos();
                atualizarContadores();
            }
        });
    </script>
</body>
</html>
