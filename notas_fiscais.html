<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notas Fiscais — Gerenciamento de Recebimento</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
  a { color: inherit; }

  /* Layout */
  .page { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 600; color: #111; }
  .header p { font-size: 13px; color: #666; margin-top: 2px; }
  .header-btns { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Botões */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #d0d0d0; background: #fff; color: #333; transition: background 0.15s, box-shadow 0.15s; white-space: nowrap; }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #1a5fb4; color: #fff; border-color: #1a5fb4; }
  .btn-primary:hover { background: #164f9e; }
  .btn-danger { background: #c0392b; color: #fff; border-color: #c0392b; }
  .btn-danger:hover { background: #a93226; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* Card */
  .card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; padding: 1rem; margin-bottom: 1rem; }

  /* Filtros */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .filter-toggle { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; padding: 4px 0; }
  .filter-toggle:hover { color: #111; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 0.75rem; border-top: 1px solid #eee; margin-top: 0.5rem; }
  .filter-row input, .filter-row select { font-size: 13px; padding: 7px 10px; border-radius: 6px; border: 1px solid #d0d0d0; background: #fff; color: #1a1a1a; height: 34px; }
  .filter-row input { flex: 1; min-width: 130px; }
  .filter-row select { min-width: 150px; }

  /* Tabela */
  .table-wrap { overflow-x: auto; }
  .count-label { font-size: 13px; color: #888; margin-bottom: 0.5rem; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  thead th { text-align: left; padding: 9px 10px; font-size: 12px; font-weight: 600; color: #555; border-bottom: 2px solid #e8e8e8; white-space: nowrap; cursor: pointer; user-select: none; background: #fafafa; }
  thead th:hover { color: #111; }
  thead th.sorted { color: #1a5fb4; }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
  tbody tr:hover { background: #f8f9ff; }
  tbody td { padding: 9px 10px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  tbody td.valor { font-weight: 600; }

  /* Badges */
  .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.2px; }
  .badge-nao { background: #fde8e8; color: #c0392b; }
  .badge-ok { background: #e8f8f0; color: #1a7a45; }
  .badge-pend { background: #fef3e2; color: #a0522d; }

  /* Ações */
  .row-actions { display: flex; gap: 4px; }
  .icon-btn { border: none; background: none; cursor: pointer; color: #aaa; padding: 4px 6px; border-radius: 5px; font-size: 16px; line-height: 1; transition: background 0.1s, color 0.1s; }
  .icon-btn:hover { color: #333; background: #f0f0f0; }
  .icon-btn.del:hover { color: #c0392b; background: #fde8e8; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.5rem; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 1rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #d0d0d0; font-size: 13px; color: #1a1a1a; background: #fff; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #1a5fb4; box-shadow: 0 0 0 2px rgba(26,95,180,0.15); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: #222; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Empty */
  .empty { text-align: center; padding: 2.5rem; color: #aaa; font-size: 13px; }

  /* Resumo */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .summary-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 16px; }
  .summary-card .label { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-card .value { font-size: 20px; font-weight: 600; color: #111; margin-top: 4px; }
  .summary-card .value.red { color: #c0392b; }
  .summary-card .value.green { color: #1a7a45; }
  .summary-card .value.blue { color: #1a5fb4; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>📋 Notas Fiscais</h1>
      <p>Gerenciamento de recebimento</p>
    </div>
    <div class="header-btns">
      <button class="btn" onclick="exportarCSV()">⬇ Exportar CSV</button>
      <button class="btn btn-primary" onclick="abrirModal()">+ Nova Nota Fiscal</button>
    </div>
  </div>

  <!-- Resumo -->
  <div class="summary">
    <div class="summary-card">
      <div class="label">Total de notas</div>
      <div class="value blue" id="s-total">0</div>
    </div>
    <div class="summary-card">
      <div class="label">Valor total</div>
      <div class="value" id="s-valor">R$ 0,00</div>
    </div>
    <div class="summary-card">
      <div class="label">Não acatadas</div>
      <div class="value red" id="s-nao">0</div>
    </div>
    <div class="summary-card">
      <div class="label">Acatadas</div>
      <div class="value green" id="s-ok">0</div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="card">
    <div class="toolbar">
      <button class="filter-toggle" onclick="toggleFiltros()">▼ Filtros</button>
      <button class="btn btn-sm" onclick="limparFiltros()">✕ Limpar filtros</button>
    </div>
    <div id="filtros-row" class="filter-row" style="display:none">
      <input type="text" id="f-fornecedor" placeholder="Fornecedor..." oninput="renderTabela()">
      <input type="text" id="f-nf" placeholder="Nº NF..." oninput="renderTabela()">
      <select id="f-status" onchange="renderTabela()">
        <option value="">Todos os status</option>
        <option value="NÃO ACATADA">Não acatada</option>
        <option value="ACATADA">Acatada</option>
        <option value="PENDENTE">Pendente</option>
      </select>
      <input type="date" id="f-data-ini" oninput="renderTabela()" title="Data inicial">
      <input type="date" id="f-data-fim" oninput="renderTabela()" title="Data final">
    </div>
  </div>

  <!-- Tabela -->
  <div class="card">
    <div class="count-label" id="count-label"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="ordenar('data')">Data <span id="sort-data"></span></th>
            <th onclick="ordenar('fornecedor')">Fornecedor <span id="sort-fornecedor"></span></th>
            <th onclick="ordenar('nf')">NF <span id="sort-nf"></span></th>
            <th onclick="ordenar('valor')">Valor <span id="sort-valor"></span></th>
            <th>Chegada</th>
            <th>Temp.</th>
            <th>Saída</th>
            <th>Observação</th>
            <th onclick="ordenar('status')">Status <span id="sort-status"></span></th>
            <th style="width:70px">Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-body"></tbody>
      </table>
      <div class="empty" id="empty-msg" style="display:none">Nenhuma nota encontrada.</div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-titulo">Nova Nota Fiscal</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Data *</label>
        <input type="date" id="m-data">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="m-status">
          <option value="NÃO ACATADA">Não acatada</option>
          <option value="ACATADA">Acatada</option>
          <option value="PENDENTE">Pendente</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Fornecedor *</label>
        <input type="text" id="m-fornecedor" placeholder="Nome do fornecedor">
      </div>
      <div class="form-group">
        <label>Nº NF *</label>
        <input type="text" id="m-nf" placeholder="Ex: 1.325.861">
      </div>
      <div class="form-group">
        <label>Valor (R$) *</label>
        <input type="text" id="m-valor" placeholder="Ex: 1234,56">
      </div>
      <div class="form-group">
        <label>Chegada</label>
        <input type="time" id="m-chegada">
      </div>
      <div class="form-group">
        <label>Temperatura</label>
        <input type="text" id="m-temp" placeholder="-">
      </div>
      <div class="form-group">
        <label>Saída</label>
        <input type="time" id="m-saida">
      </div>
      <div class="form-group full">
        <label>Observação</label>
        <input type="text" id="m-obs" placeholder="Opcional">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarNota()">Salvar nota</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'notas_fiscais_v1';
let notas = [];
let nextId = 1;
let sortCol = 'data', sortAsc = false;
let editId = null;
let filtrosVisiveis = false;

// ── Persistência ──────────────────────────────────────────────
function salvarStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ notas, nextId }));
}
function carregarStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      notas = d.notas || [];
      nextId = d.nextId || notas.length + 1;
    }
  } catch(e) {}
  if (notas.length === 0) carregarDadosIniciais();
}
function carregarDadosIniciais() {
  notas = [
    { id:1, data:'2026-06-22', fornecedor:'Safra', nf:'1.325.861', valor:146.34, chegada:'09:46', temp:'-', saida:'-', obs:'-', status:'NÃO ACATADA' },
    { id:2, data:'2026-06-22', fornecedor:'Danone', nf:'4.557.220', valor:3376.15, chegada:'09:45', temp:'-', saida:'-', obs:'-', status:'NÃO ACATADA' },
    { id:3, data:'2026-06-22', fornecedor:'Magario', nf:'178.060', valor:1851.30, chegada:'09:42', temp:'-', saida:'-', obs:'-', status:'NÃO ACATADA' },
    { id:4, data:'2026-06-22', fornecedor:'La Vitta e bolo', nf:'17.766', valor:683.70, chegada:'09:34', temp:'-', saida:'-', obs:'-', status:'NÃO ACATADA' },
    { id:5, data:'2026-06-22', fornecedor:'Pepsico', nf:'282.275', valor:28.65, chegada:'09:05', temp:'-', saida:'10:53', obs:'-', status:'NÃO ACATADA' },
    { id:6, data:'2026-06-22', fornecedor:'Pepsico', nf:'282.276', valor:14663.59, chegada:'09:04', temp:'-', saida:'10:53', obs:'-', status:'NÃO ACATADA' },
    { id:7, data:'2026-06-22', fornecedor:'Panco', nf:'3.841.912', valor:3075.49, chegada:'09:04', temp:'-', saida:'-', obs:'-', status:'NÃO ACATADA' },
    { id:8, data:'2026-06-22', fornecedor:'Rufini', nf:'236.560', valor:1153.80, chegada:'09:03', temp:'-', saida:'-', obs:'-', status:'NÃO ACATADA' },
    { id:9, data:'2026-06-22', fornecedor:'Rufini', nf:'236.561', valor:1266.30, chegada:'09:02', temp:'-', saida:'-', obs:'-', status:'NÃO ACATADA' },
    { id:10, data:'2026-06-22', fornecedor:'Alpi', nf:'61.975', valor:1119.13, chegada:'07:06', temp:'-', saida:'-', obs:'-', status:'NÃO ACATADA' },
  ];
  nextId = 11;
  salvarStorage();
}

// ── Formatação ────────────────────────────────────────────────
function fmtData(d) {
  if (!d) return '-';
  const [y,m,dia] = d.split('-');
  return `${dia}/${m}/${y}`;
}
function fmtValor(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function badgeClass(s) {
  if (s === 'NÃO ACATADA') return 'badge-nao';
  if (s === 'ACATADA') return 'badge-ok';
  return 'badge-pend';
}
function parseValor(str) {
  return parseFloat(String(str).replace(/\./g,'').replace(',','.')) || 0;
}

// ── Filtros ───────────────────────────────────────────────────
function filtradas() {
  const forn = document.getElementById('f-fornecedor').value.toLowerCase();
  const nf   = document.getElementById('f-nf').value.toLowerCase();
  const st   = document.getElementById('f-status').value;
  const di   = document.getElementById('f-data-ini').value;
  const df   = document.getElementById('f-data-fim').value;
  return notas.filter(n => {
    if (forn && !n.fornecedor.toLowerCase().includes(forn)) return false;
    if (nf   && !n.nf.toLowerCase().includes(nf)) return false;
    if (st   && n.status !== st) return false;
    if (di   && n.data < di) return false;
    if (df   && n.data > df) return false;
    return true;
  });
}
function toggleFiltros() {
  filtrosVisiveis = !filtrosVisiveis;
  document.getElementById('filtros-row').style.display = filtrosVisiveis ? 'flex' : 'none';
}
function limparFiltros() {
  ['f-fornecedor','f-nf','f-status','f-data-ini','f-data-fim'].forEach(id => {
    document.getElementById(id).value = '';
  });
  renderTabela();
}

// ── Ordenação ─────────────────────────────────────────────────
function ordenar(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  renderTabela();
}

// ── Render ────────────────────────────────────────────────────
function renderTabela() {
  const lista = filtradas().sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'valor') { va = +va; vb = +vb; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  // Resumo
  const total = notas.length;
  const valorTotal = notas.reduce((s,n) => s + Number(n.valor), 0);
  const naoAcatadas = notas.filter(n => n.status === 'NÃO ACATADA').length;
  const acatadas = notas.filter(n => n.status === 'ACATADA').length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-valor').textContent = fmtValor(valorTotal);
  document.getElementById('s-nao').textContent = naoAcatadas;
  document.getElementById('s-ok').textContent = acatadas;
  document.getElementById('count-label').textContent = `${lista.length} nota${lista.length !== 1 ? 's' : ''} encontrada${lista.length !== 1 ? 's' : ''}`;

  const tbody = document.getElementById('tabela-body');
  const empty = document.getElementById('empty-msg');

  if (lista.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = lista.map(n => `
    <tr>
      <td>${fmtData(n.data)}</td>
      <td title="${n.fornecedor}">${n.fornecedor}</td>
      <td>${n.nf}</td>
      <td class="valor">${fmtValor(n.valor)}</td>
      <td>${n.chegada || '-'}</td>
      <td>${n.temp || '-'}</td>
      <td>${n.saida || '-'}</td>
      <td title="${n.obs || '-'}">${n.obs || '-'}</td>
      <td><span class="badge ${badgeClass(n.status)}">${n.status}</span></td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" title="Editar" onclick="editarNota(${n.id})">✏️</button>
          <button class="icon-btn del" title="Excluir" onclick="excluirNota(${n.id})">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ── Modal ─────────────────────────────────────────────────────
function abrirModal(nota) {
  editId = nota ? nota.id : null;
  document.getElementById('modal-titulo').textContent = nota ? 'Editar Nota Fiscal' : 'Nova Nota Fiscal';
  document.getElementById('m-data').value = nota ? nota.data : new Date().toISOString().slice(0,10);
  document.getElementById('m-fornecedor').value = nota ? nota.fornecedor : '';
  document.getElementById('m-nf').value = nota ? nota.nf : '';
  document.getElementById('m-valor').value = nota ? String(nota.valor).replace('.',',') : '';
  document.getElementById('m-chegada').value = nota && nota.chegada !== '-' ? nota.chegada : '';
  document.getElementById('m-temp').value = nota && nota.temp !== '-' ? nota.temp : '';
  document.getElementById('m-saida').value = nota && nota.saida !== '-' ? nota.saida : '';
  document.getElementById('m-obs').value = nota && nota.obs !== '-' ? nota.obs : '';
  document.getElementById('m-status').value = nota ? nota.status : 'NÃO ACATADA';
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('m-fornecedor').focus();
}
function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null;
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') fecharModal();
});

function salvarNota() {
  const fornecedor = document.getElementById('m-fornecedor').value.trim();
  const nf = document.getElementById('m-nf').value.trim();
  const data = document.getElementById('m-data').value;
  const valorStr = document.getElementById('m-valor').value;
  if (!fornecedor) { toast('Informe o fornecedor.'); return; }
  if (!nf) { toast('Informe o número da NF.'); return; }
  if (!data) { toast('Informe a data.'); return; }
  const valor = parseValor(valorStr);

  const nota = {
    data,
    fornecedor,
    nf,
    valor,
    chegada: document.getElementById('m-chegada').value || '-',
    temp: document.getElementById('m-temp').value.trim() || '-',
    saida: document.getElementById('m-saida').value || '-',
    obs: document.getElementById('m-obs').value.trim() || '-',
    status: document.getElementById('m-status').value,
  };

  if (editId) {
    const idx = notas.findIndex(n => n.id === editId);
    if (idx !== -1) notas[idx] = { ...notas[idx], ...nota };
    toast('Nota atualizada!');
  } else {
    notas.unshift({ id: nextId++, ...nota });
    toast('Nota adicionada!');
  }

  salvarStorage();
  fecharModal();
  renderTabela();
}

function editarNota(id) {
  const nota = notas.find(n => n.id === id);
  if (nota) abrirModal(nota);
}
function excluirNota(id) {
  if (!confirm('Excluir esta nota fiscal? Esta ação não pode ser desfeita.')) return;
  notas = notas.filter(n => n.id !== id);
  salvarStorage();
  renderTabela();
  toast('Nota excluída.');
}

// ── Exportar ──────────────────────────────────────────────────
function exportarCSV() {
  const cols = ['Data','Fornecedor','NF','Valor','Chegada','Temp.','Saída','Observação','Status'];
  const rows = filtradas().map(n => [
    fmtData(n.data), n.fornecedor, n.nf, fmtValor(n.valor),
    n.chegada||'-', n.temp||'-', n.saida||'-', n.obs||'-', n.status
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(';'));
  const csv = [cols.join(';'), ...rows].join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `notas_fiscais_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSV exportado!');
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────────────────
carregarStorage();
renderTabela();
</script>
